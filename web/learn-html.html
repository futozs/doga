<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Alapok – WEB Tananyag</title>
  <link rel="icon" href="../kando_favion_dark.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="../kando_favion_light.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a; --bg2:#111827; --bg3:#1e293b;
      --border:#1f2937; --accent:#22c55e; --accent2:#16a34a;
      --text:#e2e8f0; --muted:#94a3b8;
      --blue:#3b82f6; --red:#ef4444; --yellow:#fbbf24;
      --font:'Segoe UI',system-ui,sans-serif;
      --topbar-h:54px; --bottom-h:52px; --left-w:230px;
    }
    html,body { height:100%; overflow:hidden; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

    /* ── TOPBAR ── */
    .topbar { height:var(--topbar-h); background:var(--bg2); border-bottom:1.5px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:10px; flex-shrink:0; }
    .topbar-logo { height:30px; cursor:pointer; }
    .btn-back { display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:8px; background:transparent; border:1.5px solid var(--border); color:var(--muted); font-size:0.82rem; cursor:pointer; text-decoration:none; transition:border-color .2s,color .2s; white-space:nowrap; }
    .btn-back:hover { border-color:var(--accent); color:var(--accent); }
    .topbar-info { line-height:1.3; }
    .topbar-title { font-size:0.95rem; font-weight:700; color:var(--text); }
    .topbar-sub { font-size:0.75rem; color:var(--muted); }
    .topbar-spacer { flex:1; }
    .progress-label { font-size:0.8rem; color:var(--muted); white-space:nowrap; }
    .progress-label span { color:var(--accent); font-weight:700; }

    /* ── LAYOUT ── */
    .layout { display:flex; flex:1; overflow:hidden; }

    /* ── LEFT PANEL ── */
    .left-panel { width:var(--left-w); flex-shrink:0; background:var(--bg2); border-right:1.5px solid var(--border); overflow-y:auto; padding:10px 8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .block-group { margin-bottom:6px; border:1px solid var(--border); border-radius:9px; overflow:hidden; }
    .block-header { padding:8px 10px; background:var(--bg3); font-size:0.79rem; font-weight:700; color:var(--muted); display:flex; align-items:center; gap:6px; }
    .block-done-mark { margin-left:auto; color:var(--accent); font-size:0.72rem; }
    .block-tasks { padding:5px 6px; display:flex; flex-direction:column; gap:3px; }
    .task-pill { display:flex; align-items:flex-start; gap:7px; padding:6px 8px; border-radius:7px; border:1px solid transparent; cursor:pointer; font-size:0.8rem; color:var(--muted); transition:all .14s; }
    .task-pill:hover:not(.locked) { background:var(--bg3); color:var(--text); }
    .task-pill.active { background:rgba(59,130,246,.12); border-color:var(--blue); color:#93c5fd; }
    .task-pill.done { color:var(--accent); }
    .task-pill.locked { opacity:.32; cursor:not-allowed; }
    .pill-icon { font-size:0.75rem; margin-top:2px; flex-shrink:0; }
    .pill-label { font-size:0.8rem; line-height:1.3; }
    .pill-type { font-size:0.67rem; color:var(--muted); margin-top:1px; }

    /* ── MAIN PANEL ── */
    .main-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; padding:16px 22px 12px; gap:0; min-width:0; }
    .task-meta { display:flex; align-items:center; gap:8px; flex-shrink:0; margin-bottom:4px; }
    .task-num { font-size:0.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
    .type-badge { font-size:0.68rem; padding:2px 8px; border-radius:20px; font-weight:600; }
    .badge-quiz  { background:rgba(168,85,247,.15); color:#c084fc; border:1px solid rgba(168,85,247,.3); }
    .badge-fillin{ background:rgba(59,130,246,.15);  color:#93c5fd; border:1px solid rgba(59,130,246,.3); }
    .badge-monaco{ background:rgba(34,197,94,.12);   color:#86efac; border:1px solid rgba(34,197,94,.3); }
    .task-title-row { font-size:1.15rem; font-weight:700; color:var(--text); flex-shrink:0; margin-bottom:10px; }

    /* ── CONTENT AREA (fill viewport) ── */
    .content-area { flex:1; display:flex; overflow:hidden; gap:16px; }

    /* Quiz & Fillin: két oszlop */
    .content-area.two-col { flex-direction:row; }
    .exp-col { width:38%; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .task-col { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

    /* Monaco: egy oszlop */
    .content-area.one-col { flex-direction:column; }
    .exp-compact { flex-shrink:0; overflow:hidden; }

    /* ── MAGYARÁZAT DOBOZ ── */
    .exp-box { background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:9px; padding:12px 14px; font-size:0.83rem; color:#cbd5e1; line-height:1.65; height:100%; }
    .exp-box.compact { height:auto; }
    .exp-box code { background:#1e293b; color:#93c5fd; padding:1px 5px; border-radius:4px; font-size:0.8rem; }
    .exp-box strong { color:#f1f5f9; }
    .exp-box ul { margin:6px 0 2px 16px; }
    .exp-box ul li { margin-bottom:3px; }
    .exp-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--blue); font-weight:700; margin-bottom:7px; }

    /* ── QUIZ ── */
    .quiz-q { font-size:0.95rem; font-weight:600; color:var(--text); margin-bottom:14px; }
    .quiz-opts { display:flex; flex-direction:column; gap:8px; }
    .quiz-opt { display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:9px; border:1.5px solid var(--border); background:var(--bg2); cursor:pointer; font-size:0.87rem; color:var(--text); transition:all .16s; }
    .quiz-opt:hover:not(.disabled) { border-color:var(--blue); background:rgba(59,130,246,.06); }
    .quiz-opt.selected { border-color:var(--blue); background:rgba(59,130,246,.1); }
    .quiz-opt.correct { border-color:var(--accent); background:rgba(34,197,94,.1); color:#86efac; }
    .quiz-opt.wrong   { border-color:var(--red);    background:rgba(239,68,68,.1);  color:#fca5a5; }
    .quiz-opt.disabled{ cursor:default; }
    .opt-letter { width:26px; height:26px; border-radius:50%; background:var(--bg3); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; flex-shrink:0; }
    .quiz-opt.correct .opt-letter { background:var(--accent); border-color:var(--accent); color:#052e16; }
    .quiz-opt.wrong   .opt-letter { background:var(--red);    border-color:var(--red);    color:#fff; }
    .quiz-feedback { margin-top:12px; padding:10px 13px; border-radius:9px; font-size:0.84rem; line-height:1.6; display:none; }
    .quiz-feedback.show { display:block; }
    .quiz-feedback.ok  { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#86efac; }
    .quiz-feedback.err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
    .quiz-feedback code { background:rgba(255,255,255,.08); padding:1px 4px; border-radius:3px; font-size:0.8rem; }

    /* ── FILL-IN ── */
    .fillin-label { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:8px; }
    .code-tpl { background:#020617; border:1px solid #0f1f3a; border-radius:9px; padding:14px 16px; font-family:'Consolas','Fira Code',monospace; font-size:0.87rem; line-height:2.1; color:#a3e635; white-space:pre-wrap; word-break:break-all; }
    .blank-in { display:inline-block; background:#0f2744; border:1.5px solid var(--blue); border-radius:5px; padding:0 6px; color:#93c5fd; font-family:inherit; font-size:inherit; font-weight:700; outline:none; min-width:44px; transition:border-color .18s; vertical-align:baseline; }
    .blank-in:focus { border-color:#60a5fa; box-shadow:0 0 0 2px rgba(59,130,246,.2); }
    .blank-in.ok  { border-color:var(--accent); background:rgba(34,197,94,.1); color:#86efac; }
    .blank-in.err { border-color:var(--red);    background:rgba(239,68,68,.1);  color:#fca5a5; }
    .blank-in:disabled { opacity:.7; }
    .fillin-fb { margin-top:10px; font-size:0.82rem; line-height:1.6; display:none; }
    .fillin-fb.show { display:block; }

    /* ── MONACO ── */
    .monaco-row { flex:1; display:flex; gap:12px; overflow:hidden; margin-top:10px; }
    .monaco-wrap { flex:1; border:1px solid var(--border); border-radius:9px; overflow:hidden; min-width:0; }
    .preview-wrap { flex:1; display:flex; flex-direction:column; border:1px solid var(--border); border-radius:9px; overflow:hidden; }
    .preview-hd { padding:5px 10px; background:var(--bg3); border-bottom:1px solid var(--border); font-size:0.7rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; gap:5px; flex-shrink:0; }
    .pdot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #monaco-preview { flex:1; border:none; background:#fff; }
    .check-list { flex-shrink:0; display:flex; flex-wrap:wrap; gap:5px 14px; padding-top:8px; }
    .chk-row { display:flex; align-items:center; gap:5px; font-size:0.8rem; color:var(--muted); }
    .chk-row.pass { color:var(--accent); }

    /* ── SUCCESS BANNER ── */
    .success-banner { display:none; flex-shrink:0; margin-top:10px; background:rgba(34,197,94,.1); border:1.5px solid rgba(34,197,94,.35); border-radius:10px; padding:10px 14px; text-align:center; font-size:0.88rem; color:var(--accent); font-weight:600; }
    .success-banner.show { display:block; }

    /* ── BOTTOM BAR ── */
    .bottom-bar { height:var(--bottom-h); background:var(--bg2); border-top:1.5px solid var(--border); display:flex; align-items:center; padding:0 18px; gap:12px; flex-shrink:0; }
    .btn-check { padding:9px 22px; border-radius:9px; background:var(--accent2); border:1.5px solid var(--accent); color:#fff; font-size:0.87rem; font-weight:700; cursor:pointer; transition:background .18s; display:flex; align-items:center; gap:7px; }
    .btn-check:hover { background:var(--accent); }
    .btn-check:disabled { opacity:.4; cursor:default; }
    .score-msg { font-size:0.84rem; color:var(--muted); flex:1; }
    .btn-next { padding:9px 18px; border-radius:9px; background:transparent; border:1.5px solid var(--border); color:var(--muted); font-size:0.87rem; font-weight:600; cursor:pointer; transition:all .18s; display:flex; align-items:center; gap:6px; margin-left:auto; }
    .btn-next:hover:not(:disabled) { border-color:var(--blue); color:#93c5fd; }
    .btn-next:disabled { opacity:.3; cursor:default; }

    /* ── CONFETTI & MODAL ── */
    .confetti-flash { position:fixed; inset:0; z-index:9999; pointer-events:none; display:flex; align-items:center; justify-content:center; font-size:5rem; opacity:0; }
    .confetti-flash.animate { animation:cpop .7s ease-out forwards; }
    @keyframes cpop{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.2)}70%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
    .modal-ov { display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.8); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    .modal-ov.show { display:flex; }
    .modal-box { background:var(--bg2); border:1px solid var(--accent); border-radius:14px; padding:32px 28px; max-width:400px; width:94%; text-align:center; }
    .modal-box h2 { color:var(--accent); font-size:1.2rem; margin:10px 0 8px; }
    .modal-box p { color:#cbd5e1; font-size:0.88rem; line-height:1.6; margin-bottom:20px; }
    .modal-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn-m { padding:9px 18px; border-radius:8px; font-size:0.86rem; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
    .btn-m-p { background:var(--accent); color:#000; border:none; }
    .btn-m-p:hover { background:var(--yellow); }
    .btn-m-s { background:transparent; color:#94a3b8; border:1px solid var(--border); }
    .btn-m-s:hover { color:#f1f5f9; border-color:#64748b; }

    ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>

<script>
'use strict';

// ── Streak counter ──────────────────────────────────────────────────────────
(function(){
  const u=JSON.parse(sessionStorage.getItem('kandoUser')||'{}');
  if(!u.email) return;
  const email=u.email.replace('@kkszki.hu','');
  fetch('https://agazati.up.railway.app/api/leaderboard/rank/'+encodeURIComponent(email))
    .then(r=>r.ok?r.json():null).then(d=>{
      const s=d?.streak??0, el=document.getElementById('streak-counter');
      if(!el||s<1) return;
      const lbl=s>=30?'Élő Legenda':s>=14?'Kitartó Harcos':s>=7?'Heti Hős':s>=3?'Ügyes Kezdő':null;
      el.innerHTML='🔥 '+s+' nap'+(lbl?' · '+lbl:'');
      el.style.display='flex';
    }).catch(()=>{});
})();

// ══════════════════════════════════════════════════════════════════════
// FELADATOK
// ══════════════════════════════════════════════════════════════════════
// codeTemplate-ben a ___ (három aláhúzás) egy-egy kitöltendő mező,
// sorban a blanks tömbnek megfelelően.

const tasks = [

  // ── BLOKK 1: Mi a HTML? ──────────────────────────────────────────
  {
    id:1, block:1, blockName:'Mi a HTML?', emoji:'🏗️',
    type:'quiz',
    title:'Mi a HTML?',
    explanation:`<div class="exp-label">📖 Tananyag</div>
      A <strong>HTML</strong> (HyperText Markup Language) egy <strong>jelölőnyelv</strong> – nem programozás!
      Olyan mint egy Word dokumentum, csak kézzel írjuk a formázást
      <code>&lt; &gt;</code> jelek közé – ezeket hívjuk <strong>tageknek</strong>.
      <br><br>
      A böngésző (Chrome, Firefox) olvassa el és jeleníti meg.
      <br><br>
      Pl. a <code>&lt;p&gt;</code> egy nyitó tag, a <code>&lt;/p&gt;</code> a záró tag –
      a kettő között van a tartalom.`,
    question:'Mire való a HTML?',
    options:[
      'Programokat futtat a számítógépen',
      'Megmondja a böngészőnek, hogyan épüljön fel a weboldal',
      'Adatbázisokat kezel',
      'Képeket rajzol és animál'
    ],
    correct:1,
    feedback:'✅ Pontosan! A HTML csak <em>leírja</em> az oldal szerkezetét – hogy mi hol legyen. Nem programoz, nem számol, csak szervez és jelöl.'
  },

  {
    id:2, block:1, blockName:'Mi a HTML?', emoji:'🏗️',
    type:'fillin',
    title:'A HTML váz felépítése',
    explanation:`<div class="exp-label">📖 Tananyag</div>
      Minden HTML oldal ugyanígy kezdődik:
      <ul>
        <li><code>&lt;!DOCTYPE html&gt;</code> — "ez HTML5 oldal"</li>
        <li><code>&lt;html lang="hu"&gt;</code> — az egész oldal, <code>lang="hu"</code> = magyar</li>
        <li><code>&lt;head&gt;</code> — beállítások (nem látszik az oldalon)</li>
        <li><code>&lt;meta charset="UTF-8"&gt;</code> — nélküle az ékezetek (á,é,ő) rosszul jelennek meg</li>
        <li><code>&lt;body&gt;</code> — ide kerül minden amit a látogató lát</li>
      </ul>`,
    codeTemplate:
`<!___ html>
<html ___="hu">
<___>
  <meta charset="UTF-8">
  <title>Az én weboldalem</title>
</head>
<___>
  <p>Hello világ!</p>
</body>
</html>`,
    blanks:[
      { answer:'DOCTYPE', hint:'Nagybetűs – minden HTML oldal ezzel kezdődik' },
      { answer:'lang',    hint:'Attribútum neve, ami a nyelvet jelzi' },
      { answer:'head',    hint:'Fejléc – a beállítások helye, nem látszik az oldalon' },
      { answer:'body',    hint:'Test – a látható tartalom helye' }
    ]
  },

  {
    id:3, block:1, blockName:'Mi a HTML?', emoji:'🏗️',
    type:'monaco',
    title:'Írd meg a saját HTML vázadat!',
    explanation:`<div class="exp-label">✏️ Feladat</div>
      Készíts egy teljes HTML oldalt:
      <ul>
        <li>A <code>&lt;html&gt;</code> elemen legyen <code>lang="hu"</code></li>
        <li>A <code>&lt;title&gt;</code> tartalma: <strong>Első oldalam</strong></li>
        <li>A <code>&lt;body&gt;</code>-ban egy <code>&lt;p&gt;</code> bekezdés: <strong>Helló, HTML!</strong></li>
      </ul>
      💡 Írd be: <strong>!</strong> majd nyomd meg a <strong>Tab</strong> billentyűt – az Emmet legenerálja a vázat!`,
    starterHtml:'',
    checks:[
      { label:'lang="hu" az html elemen',         fn:(h,d)=>!!d.querySelector('html[lang="hu"]') },
      { label:'<title>Első oldalam</title>',       fn:(h,d)=>d.querySelector('title')?.textContent?.trim()==='Első oldalam' },
      { label:'<p> bekezdés a body-ban',           fn:(h,d)=>!!d.querySelector('body p') },
      { label:'A bekezdés tartalmazza: Helló, HTML!', fn:(h,d)=>[...d.querySelectorAll('body p')].some(p=>p.textContent.includes('Helló, HTML!')) }
    ]
  },

  // ── BLOKK 2: Szöveg elemek ───────────────────────────────────────
  {
    id:4, block:2, blockName:'Szöveg elemek', emoji:'📝',
    type:'quiz',
    title:'Fejléc elemek: h1–h6',
    explanation:`<div class="exp-label">📖 Tananyag</div>
      A HTML-ben 6 szintű fejléc (cím) létezik. Képzeld el mint egy könyvben:
      <ul>
        <li><code>&lt;h1&gt;</code> — A könyv főcíme (nagy, vastag). <strong>Oldalanként csak egy!</strong></li>
        <li><code>&lt;h2&gt;</code> — Fejezet cím</li>
        <li><code>&lt;h3&gt;</code> — Alfejezet</li>
        <li><code>&lt;h6&gt;</code> — A legkisebb alcím</li>
      </ul>
      A <code>&lt;p&gt;</code> elem a <strong>bekezdés</strong> – a legtöbb szöveg ide kerül.`,
    question:'Melyik HTML elem a legfontosabb (legnagyobb) főcím?',
    options:['&lt;h6&gt;','&lt;title&gt;','&lt;h1&gt;','&lt;header&gt;'],
    correct:2,
    feedback:'✅ Igen! <code>&lt;h1&gt;</code> a legnagyobb, <code>&lt;h6&gt;</code> a legkisebb. A <code>&lt;title&gt;</code> csak a böngésző fülén jelenik meg. A <code>&lt;header&gt;</code> egy strukturális doboz, nem cím.'
  },

  {
    id:5, block:2, blockName:'Szöveg elemek', emoji:'📝',
    type:'fillin',
    title:'Szöveg formázó elemek',
    explanation:`<div class="exp-label">📖 Tananyag</div>
      A legfontosabb szövegformázó elemek:
      <ul>
        <li><code>&lt;strong&gt;</code> — <strong>félkövér</strong>, fontos tartalom</li>
        <li><code>&lt;em&gt;</code> — <em>dőlt</em>, hangsúlyos, idegen szavakhoz</li>
        <li><code>&lt;u&gt;</code> — <u>aláhúzott</u> szöveg (vizsgán kérik!)</li>
        <li><code>&lt;br&gt;</code> — sortörés, önzáró (nincs záró tagje!)</li>
      </ul>
      ⚠️ Ne <code>&lt;b&gt;</code> és <code>&lt;i&gt;</code> – azok csak vizuálisan formáznak, szemantikus jelentésük nincs.`,
    codeTemplate:
`<h1>Kedvenc ételeim</h1>

<p>
  A <___>pizza</strong> az <___>olasz</em> konyha remeke.
</p>

<p>
  A <___>gulyás</u> magyar klasszikus.<___>
  Szeretem főzni.
</p>`,
    blanks:[
      { answer:'strong', hint:'Félkövér – fontos tartalom jelölője' },
      { answer:'em',     hint:'Dőlt – idegen szavakhoz, hangsúlyhoz' },
      { answer:'u',      hint:'Aláhúzott szöveg' },
      { answer:'br',     hint:'Sortörés – önzáró elem, nincs záró tagje!' }
    ]
  },

  {
    id:6, block:2, blockName:'Szöveg elemek', emoji:'📝',
    type:'monaco',
    title:'Formázd meg a szöveget!',
    explanation:`<div class="exp-label">✏️ Feladat</div>
      A megadott vázba írd be a hiányzó tartalmat:
      <ul>
        <li>Főcím <code>&lt;h1&gt;</code>: <strong>Kedvenc ételeim</strong></li>
        <li>Alcím <code>&lt;h2&gt;</code>: <strong>Olasz ételek</strong></li>
        <li>Bekezdés: "A <strong>pizza</strong> az <em>olasz</em> konyha remeke."</li>
        <li>Valahol legyen <code>&lt;u&gt;</code> aláhúzás is</li>
      </ul>`,
    starterHtml:
`<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Ételek</title>
</head>
<body>

</body>
</html>`,
    checks:[
      { label:'<h1> főcím az oldalon',              fn:(h,d)=>!!d.querySelector('h1') },
      { label:'h1 tartalma: Kedvenc ételeim',        fn:(h,d)=>d.querySelector('h1')?.textContent?.trim()==='Kedvenc ételeim' },
      { label:'<h2> alcím az oldalon',               fn:(h,d)=>!!d.querySelector('h2') },
      { label:'<strong> félkövér egy bekezdésben',   fn:(h,d)=>!!d.querySelector('p strong') },
      { label:'<em> dőlt egy bekezdésben',           fn:(h,d)=>!!d.querySelector('p em') },
      { label:'<u> aláhúzás valahol',               fn:(h,d)=>!!d.querySelector('u') }
    ]
  }
];

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════

const SKEY = 'lhtml_v2';
const state = {
  cur: 0,
  done:     JSON.parse(localStorage.getItem(SKEY+'_done')||'null') || Array(tasks.length).fill(false),
  qSel:     Array(tasks.length).fill(null),   // quiz: kiválasztott opció indexe
  qAnswered:Array(tasks.length).fill(false),  // quiz: már ellenőrzött-e
  monacoEd: null,
  prevTimer: null
};

// ══════════════════════════════════════════════════════════════════════
// MONACO INIT
// ══════════════════════════════════════════════════════════════════════

let monacoOk = false;
const monacoQ = [];
require.config({ paths:{ vs:'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
require(['vs/editor/editor.main'], ()=>{ monacoOk=true; monacoQ.forEach(cb=>cb()); monacoQ.length=0; });
const whenMonaco = cb => monacoOk ? cb() : monacoQ.push(cb);

// ══════════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════════

document.getElementById('prog-total').textContent = tasks.length;
buildLeft();
loadTask(0);

// ══════════════════════════════════════════════════════════════════════
// LEFT PANEL
// ══════════════════════════════════════════════════════════════════════

function buildLeft() {
  const panel = document.getElementById('left-panel');
  panel.innerHTML = '';
  const blocks = [];
  tasks.forEach((t,i) => {
    let b = blocks.find(x=>x.id===t.block);
    if (!b) { b={id:t.block,name:t.blockName,emoji:t.emoji,tasks:[]}; blocks.push(b); }
    b.tasks.push({t,i});
  });
  blocks.forEach(bl => {
    const allDone = bl.tasks.every(x=>state.done[x.i]);
    const g = document.createElement('div'); g.className='block-group';
    const h = document.createElement('div'); h.className='block-header';
    h.innerHTML = `<span>${bl.emoji}</span><span>${bl.name}</span>`+(allDone?'<span class="block-done-mark">✓ kész</span>':'');
    const lst = document.createElement('div'); lst.className='block-tasks';
    bl.tasks.forEach(({t,i})=>{
      const locked = i>0 && !state.done[i-1];
      const p = document.createElement('div');
      p.id='pill-'+i;
      const typeIcon = t.type==='quiz'?'❓':t.type==='fillin'?'✏️':'💻';
      const typeLabel= t.type==='quiz'?'Kvíz':t.type==='fillin'?'Kódkiegészítés':'Szerkesztő';
      p.innerHTML=`<span class="pill-icon">${state.done[i]?'✅':locked?'🔒':'⬜'}</span>
        <div><div class="pill-label">${i+1}. ${t.title}</div>
        <div class="pill-type">${typeIcon} ${typeLabel}</div></div>`;
      updatePillClass(p,i,locked);
      if(!locked) p.onclick=()=>loadTask(i);
      lst.appendChild(p);
    });
    g.appendChild(h); g.appendChild(lst); panel.appendChild(g);
  });
}

function updatePillClass(el,i,locked){
  el.className='task-pill'+(i===state.cur?' active':'')+(state.done[i]?' done':'')+(locked?' locked':'');
}

function refreshLeft(){
  tasks.forEach((_,i)=>{
    const p=document.getElementById('pill-'+i); if(!p) return;
    const locked=i>0&&!state.done[i-1];
    const t=tasks[i];
    p.querySelector('.pill-icon').textContent=state.done[i]?'✅':locked?'🔒':'⬜';
    updatePillClass(p,i,locked);
    if(!locked) p.onclick=()=>loadTask(i); else p.onclick=null;
  });
  document.getElementById('prog-done').textContent=state.done.filter(Boolean).length;
}

// ══════════════════════════════════════════════════════════════════════
// TASK LOADING
// ══════════════════════════════════════════════════════════════════════

function loadTask(idx){
  if(state.monacoEd){ state.monacoEd.dispose(); state.monacoEd=null; }
  clearTimeout(state.prevTimer);
  state.cur = idx;
  const task = tasks[idx];
  const isDone = state.done[idx];

  document.getElementById('score-msg').textContent='';
  document.getElementById('btn-next').disabled=!isDone;
  document.getElementById('btn-check').disabled=isDone && task.type!=='monaco';
  refreshLeft();

  const typeBadge = task.type==='quiz'
    ? '<span class="type-badge badge-quiz">❓ Kvíz</span>'
    : task.type==='fillin'
    ? '<span class="type-badge badge-fillin">✏️ Kódkiegészítés</span>'
    : '<span class="type-badge badge-monaco">💻 Szerkesztő</span>';

  const layoutCls = task.type==='monaco' ? 'one-col' : 'two-col';

  let expHtml = `<div class="exp-box${task.type==='monaco'?' compact':''}">${task.explanation}</div>`;
  let taskHtml = '';

  if(task.type==='quiz')   taskHtml = renderQuiz(task,idx);
  if(task.type==='fillin') taskHtml = renderFillin(task,idx);
  if(task.type==='monaco') taskHtml = renderMonacoShell(task,idx);

  const monacoContent = task.type==='monaco'
    ? `<div class="exp-compact">${expHtml}</div>${taskHtml}`
    : `<div class="exp-col">${expHtml}</div><div class="task-col">${taskHtml}</div>`;

  document.getElementById('main-panel').innerHTML=`
    <div class="task-meta">
      <span class="task-num">${task.block}. blokk · ${idx+1}. feladat</span>
      ${typeBadge}
    </div>
    <div class="task-title-row">${task.emoji} ${task.title}</div>
    <div class="content-area ${layoutCls}" id="content-area">
      ${monacoContent}
    </div>
    <div class="success-banner${isDone?' show':''}" id="suc-banner">🎉 Sikeresen teljesítetted ezt a feladatot!</div>
  `;

  if(task.type==='monaco') initMonaco(task,idx);

  // Restore quiz state if already answered
  if(task.type==='quiz' && state.qAnswered[idx]) restoreQuiz(task,idx);
  if(task.type==='fillin' && isDone) lockFillin();
}

// ══════════════════════════════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════════════════════════════

function renderQuiz(task,idx){
  const LETTERS=['A','B','C','D'];
  const opts=task.options.map((opt,i)=>
    `<div class="quiz-opt" id="opt-${i}" onclick="selQuiz(${i},${idx})">
      <span class="opt-letter">${LETTERS[i]}</span>
      <span>${opt}</span>
    </div>`
  ).join('');
  return `<div class="quiz-q">${task.question}</div>
    <div class="quiz-opts">${opts}</div>
    <div class="quiz-feedback" id="qfb"></div>`;
}

function selQuiz(optIdx,taskIdx){
  if(state.qAnswered[taskIdx]) return;
  document.querySelectorAll('.quiz-opt').forEach(el=>el.classList.remove('selected'));
  const el=document.getElementById('opt-'+optIdx);
  if(el) el.classList.add('selected');
  state.qSel[taskIdx]=optIdx;
}

function restoreQuiz(task,idx){
  const sel=state.qSel[idx];
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===task.correct) el.classList.add('correct');
    else if(i===sel && sel!==task.correct) el.classList.add('wrong');
  });
  const fb=document.getElementById('qfb');
  if(fb){ fb.className='quiz-feedback show ok'; fb.innerHTML=task.feedback; }
}

// ══════════════════════════════════════════════════════════════════════
// FILL-IN
// ══════════════════════════════════════════════════════════════════════

function renderFillin(task,idx){
  // Split template by ___ and interleave with inputs
  const parts=task.codeTemplate.split('___');
  let html='';
  parts.forEach((part,i)=>{
    html+=escH(part);
    if(i<task.blanks.length){
      const b=task.blanks[i];
      const sz=Math.max(b.answer.length+2,7);
      html+=`<input class="blank-in" id="bi-${i}" data-ans="${escH(b.answer)}" data-hint="${escH(b.hint)}" size="${sz}" placeholder="?" autocomplete="off" spellcheck="false">`;
    }
  });
  return `<div class="fillin-label">Egészítsd ki a kódot!</div>
    <div class="code-tpl">${html}</div>
    <div class="fillin-fb" id="fillin-fb"></div>`;
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function lockFillin(){
  document.querySelectorAll('.blank-in').forEach(inp=>{
    inp.disabled=true;
    inp.classList.add('ok');
  });
}

// ══════════════════════════════════════════════════════════════════════
// MONACO
// ══════════════════════════════════════════════════════════════════════

function renderMonacoShell(task,idx){
  const chks=task.checks.map((_,i)=>`<div class="chk-row" id="chk-${i}"><span class="ci">⬜</span> ${task.checks[i].label}</div>`).join('');
  return `<div class="monaco-row">
      <div class="monaco-wrap"><div id="med" style="width:100%;height:100%"></div></div>
      <div class="preview-wrap">
        <div class="preview-hd"><div class="pdot"></div>Élő előnézet</div>
        <iframe id="monaco-preview" sandbox="allow-scripts"></iframe>
      </div>
    </div>
    <div class="check-list">${chks}</div>`;
}

function initMonaco(task,idx){
  whenMonaco(()=>{
    const el=document.getElementById('med'); if(!el) return;
    state.monacoEd=monaco.editor.create(el,{
      value:task.starterHtml, language:'html', theme:'vs-dark',
      fontSize:14, minimap:{enabled:false}, automaticLayout:true,
      wordWrap:'on', scrollBeyondLastLine:false, tabSize:2,
      quickSuggestions:{other:true,comments:false,strings:true}
    });
    if(window.emmetMonaco) window.emmetMonaco.emmetHTML(monaco);
    state.monacoEd.onDidChangeModelContent(()=>{
      clearTimeout(state.prevTimer);
      state.prevTimer=setTimeout(()=>updatePreview(task),400);
    });
    if(task.starterHtml) updatePreview(task);
  });
}

function updatePreview(task){
  if(!state.monacoEd) return;
  let html=state.monacoEd.getValue();
  const base=location.href.replace(/\/[^\/]*$/,'/');
  if(!html.includes('<base')) html=html.replace('<head>',`<head>\n  <base href="${base}">`);
  const fr=document.getElementById('monaco-preview');
  if(fr) fr.srcdoc=html;
  liveChecks(task);
}

function liveChecks(task){
  if(!state.monacoEd) return;
  const html=state.monacoEd.getValue();
  let doc; try{doc=new DOMParser().parseFromString(html,'text/html');}catch(e){doc=document.implementation.createHTMLDocument('');}
  task.checks.forEach((ch,i)=>{
    const pass=(()=>{try{return !!ch.fn(html,doc);}catch(e){return false;}})();
    const el=document.getElementById('chk-'+i);
    if(el){ el.className='chk-row'+(pass?' pass':''); el.querySelector('.ci').textContent=pass?'✅':'⬜'; }
  });
}

// ══════════════════════════════════════════════════════════════════════
// CHECK
// ══════════════════════════════════════════════════════════════════════

function checkTask(){
  const t=tasks[state.cur], idx=state.cur;
  if(t.type==='quiz')   checkQuiz(t,idx);
  if(t.type==='fillin') checkFillin(t,idx);
  if(t.type==='monaco') checkMonaco(t,idx);
}

function checkQuiz(task,idx){
  if(state.qAnswered[idx]) return;
  const sel=state.qSel[idx];
  if(sel===null||sel===undefined){
    document.getElementById('score-msg').textContent='⚠️ Válassz egy lehetőséget!';
    return;
  }
  state.qAnswered[idx]=true;
  const ok=sel===task.correct;
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===task.correct) el.classList.add('correct');
    else if(i===sel&&!ok) el.classList.add('wrong');
  });
  const fb=document.getElementById('qfb');
  fb.className='quiz-feedback show '+(ok?'ok':'err');
  fb.innerHTML=ok
    ? task.feedback
    : `❌ Nem ez a helyes. A helyes: <strong>${task.options[task.correct]}</strong><br><br>${task.feedback}`;
  if(ok) markDone(idx);
  else document.getElementById('score-msg').textContent='❌ Próbáld újra – gondold át a magyarázatot!';
}

function checkFillin(task,idx){
  const inputs=document.querySelectorAll('.blank-in');
  let allOk=true;
  const hints=[];
  inputs.forEach((inp,i)=>{
    const ok=inp.value.toLowerCase().trim()===inp.dataset.ans.toLowerCase().trim();
    inp.classList.remove('ok','err');
    inp.classList.add(ok?'ok':'err');
    if(!ok){ allOk=false; hints.push(`💡 ${i+1}. mező: <em>${inp.dataset.hint}</em>`); }
  });
  const fb=document.getElementById('fillin-fb');
  fb.className='fillin-fb show';
  if(allOk){
    fb.style.color='#86efac'; fb.textContent='✅ Tökéletes! Minden mező helyes.';
    markDone(idx); lockFillin();
  } else {
    fb.style.color='#fca5a5';
    fb.innerHTML=`❌ ${hints.length} mező még nem stimmel.<br>${hints.join('<br>')}`;
  }
}

function checkMonaco(task,idx){
  if(!state.monacoEd) return;
  const html=state.monacoEd.getValue();
  let doc; try{doc=new DOMParser().parseFromString(html,'text/html');}catch(e){doc=document.implementation.createHTMLDocument('');}
  const res=task.checks.map(ch=>{try{return !!ch.fn(html,doc);}catch(e){return false;}});
  const pass=res.filter(Boolean).length, tot=res.length;
  res.forEach((r,i)=>{
    const el=document.getElementById('chk-'+i);
    if(el){ el.className='chk-row'+(r?' pass':''); el.querySelector('.ci').textContent=r?'✅':'❌'; }
  });
  document.getElementById('score-msg').innerHTML=`<span style="color:${pass===tot?'#22c55e':'#94a3b8'}">${pass}/${tot}</span> ellenőrzés teljesítve`;
  if(pass===tot) markDone(idx);
}

// ══════════════════════════════════════════════════════════════════════
// DONE / NEXT
// ══════════════════════════════════════════════════════════════════════

function markDone(idx){
  state.done[idx]=true;
  localStorage.setItem(SKEY+'_done',JSON.stringify(state.done));
  document.getElementById('btn-next').disabled=false;
  document.getElementById('btn-check').disabled=true;
  const b=document.getElementById('suc-banner'); if(b) b.classList.add('show');
  triggerConfetti(); refreshLeft();
  if(state.done.every(Boolean))
    setTimeout(()=>document.getElementById('modal-done').classList.add('show'),900);
}

function goNext(){
  const n=state.cur+1;
  if(n<tasks.length) loadTask(n);
}

function triggerConfetti(){
  const el=document.getElementById('confetti');
  el.classList.remove('animate'); void el.offsetWidth;
  el.classList.add('animate');
  setTimeout(()=>el.classList.remove('animate'),800);
}
</script>
<script src="../special-roles.js"></script>
